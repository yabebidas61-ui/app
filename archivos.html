<!DOCTYPE html>
<html>
<head>
  <title>Clientes</title>
  <style>
    body { margin:0; font-family:'Segoe UI'; display:flex; background:#f5f6fa; }
    .sidebar { width:220px; background:#1e272e; color:white; height:100vh; padding:20px; }
    .sidebar a { display:block; color:white; padding:10px; text-decoration:none; margin-top:10px; border-radius:8px; }
    .sidebar a:hover { background:#485460; }
    .main { flex:1; }
    .header { background:#ff3f34; color:white; padding:15px; font-size:20px; }
    .container { padding:20px; }
    .card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
    input { padding:10px; margin:5px; border-radius:8px; border:1px solid #ccc; width:200px; }
    button { padding:10px; border:none; background:#ff3f34; color:white; border-radius:8px; cursor:pointer; }
    button:hover { background:#e84118; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }

    /* ===== MODALES ===== */
    .overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:100;
      align-items:center;
      justify-content:center;
    }
    .overlay.open { display:flex; }
    .modal-box {
      background:white;
      border-radius:14px;
      padding:28px;
      width:360px;
      box-shadow:0 10px 40px rgba(0,0,0,0.25);
    }
    .modal-box h3 { margin:0 0 18px; font-size:17px; color:#1e272e; }
    .modal-box label { display:block; font-size:12px; color:#888; margin:12px 0 4px; }
    .modal-box input { width:100%; box-sizing:border-box; margin:0; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
    .btn-cancel { background:#eee; color:#333; }
    .btn-cancel:hover { background:#ddd; }
    .btn-danger { background:#ff3f34; }
    #passError { color:#ff3f34; font-size:12px; margin-top:6px; display:none; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>NEXUS</h2>
  <a href="index.html">💰 Venta</a>
  <a href="bodega.html">📦 Bodega</a>
  <a href="deuda.html">💸 Deudas</a>
  <a href="analisis.html">🔍 Historial</a>
  <a href="caja.html">💵 Caja</a>
  <a href="cliente.html">👤 Clientes</a>
</div>

<div class="main">
  <div class="header">👤 Clientes</div>
  <div class="container">

    <div class="card">
      <h3>Nuevo Cliente</h3>
      <input id="nombre" placeholder="Nombre">
      <input id="cedula" placeholder="Cédula">
      <input id="telefono" placeholder="Teléfono">
      <input id="correo" placeholder="Correo">
      <button onclick="guardar()">Guardar</button>
    </div>

    <div class="card">
      <h3>Lista</h3>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ===== MODAL EDITAR ===== -->
<div id="overlayEditar" class="overlay">
  <div class="modal-box">
    <h3>✏️ Editar cliente</h3>
    <input type="hidden" id="editId">
    <label>Nombre</label>
    <input type="text" id="editNombre" placeholder="Nombre">
    <label>Cédula</label>
    <input type="text" id="editCedula" placeholder="Cédula">
    <label>Teléfono</label>
    <input type="text" id="editTelefono" placeholder="Teléfono">
    <label>Correo</label>
    <input type="text" id="editCorreo" placeholder="Correo">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarEditar()">Cancelar</button>
      <button onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<!-- ===== MODAL ELIMINAR ===== -->
<div id="overlayEliminar" class="overlay">
  <div class="modal-box">
    <h3>🗑 Eliminar cliente</h3>
    <input type="hidden" id="deleteId">
    <label>Contraseña</label>
    <input type="password" id="deletePass" placeholder="Ingresa la contraseña">
    <p id="passError">❌ Contraseña incorrecta</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarEliminar()">Cancelar</button>
      <button class="btn-danger" onclick="confirmarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<script>

const API = window.location.origin.includes("localhost")
  ? "http://localhost:3000"
  : "https://agronaranjito-1.onrender.com";

// ================= CARGAR =================
async function cargar(){
  try{
    const res = await fetch(API + '/clientes');
    const data = await res.json();
    tabla.innerHTML = "";
    if(!data.length){
      tabla.innerHTML = "<tr><td colspan='5'>Sin clientes</td></tr>";
      return;
    }
    data.forEach(c => {
      tabla.innerHTML += `
        <tr>
          <td>${c.nombre}</td>
          <td>${c.cedula}</td>
          <td>${c.telefono || "-"}</td>
          <td>${c.correo || "-"}</td>
          <td>
            <button onclick="abrirEditar('${c._id}','${c.nombre}','${c.cedula}','${c.telefono || ""}','${c.correo || ""}')">✏️</button>
            <button onclick="abrirEliminar('${c._id}')">🗑</button>
          </td>
        </tr>
      `;
    });
  }catch(e){
    console.error(e);
    alert("❌ No conecta con el servidor");
  }
}

// ================= GUARDAR NUEVO =================
async function guardar(){
  if(!nombre.value || !cedula.value) return alert("Completa los datos");
  await fetch(API + '/clientes', {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      nombre: nombre.value,
      cedula: cedula.value,
      telefono: telefono.value,
      correo: correo.value
    })
  });
  nombre.value = cedula.value = telefono.value = correo.value = "";
  cargar();
}

// ================= MODAL EDITAR =================
function abrirEditar(id, n, c, t, e){
  document.getElementById('editId').value       = id;
  document.getElementById('editNombre').value   = n;
  document.getElementById('editCedula').value   = c;
  document.getElementById('editTelefono').value = t;
  document.getElementById('editCorreo').value   = e;
  document.getElementById('overlayEditar').classList.add('open');
}

function cerrarEditar(){
  document.getElementById('overlayEditar').classList.remove('open');
}

async function guardarEdicion(){
  const id       = document.getElementById('editId').value;
  const nombre   = document.getElementById('editNombre').value;
  const cedula   = document.getElementById('editCedula').value;
  const telefono = document.getElementById('editTelefono').value;
  const correo   = document.getElementById('editCorreo').value;
  if(!nombre || !cedula) return alert("Completa los datos");
  await fetch(API + '/clientes/editar', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id, nombre, cedula, telefono, correo })
  });
  cerrarEditar();
  cargar();
}

// ================= MODAL ELIMINAR =================
function abrirEliminar(id){
  document.getElementById('deleteId').value  = id;
  document.getElementById('deletePass').value = "";
  document.getElementById('passError').style.display = 'none';
  document.getElementById('overlayEliminar').classList.add('open');
  setTimeout(() => document.getElementById('deletePass').focus(), 100);
}

function cerrarEliminar(){
  document.getElementById('overlayEliminar').classList.remove('open');
}

async function confirmarEliminar(){
  const pass = document.getElementById('deletePass').value;
  if(pass !== "agro123"){
    document.getElementById('passError').style.display = 'block';
    return;
  }
  const id = document.getElementById('deleteId').value;
  await fetch(API + `/clientes/${id}`, { method:'DELETE' });
  cerrarEliminar();
  cargar();
}

// Enter en el campo contraseña también confirma
document.getElementById('deletePass').addEventListener('keydown', e => {
  if(e.key === 'Enter') confirmarEliminar();
});

cargar();
</script>

</body>
</html>
